name: TokenPlugin
version: 1.0.0
main: com.tokenplugin.TokenPlugin
api-version: 1.20
author: NLG_King
description: A powerful token system with 42 tokens, life system, and more!

commands:
  tokens:
    aliases: [t, tokenlist]
    description: Show all your tokens
  token:
    aliases: [tinfo, tokeninfo]
    description: Get info about a specific token
  tokenshop:
    aliases: [tshop, shop]
    description: Open token shop
  tokenleaderboard:
    aliases: [tlb, leaderboard, lb]
    description: Show token leaderboard
  tokencraft:
    aliases: [tcraft, craft]
    description: Craft a token
  tokenuse:
    aliases: [tuse, use]
    description: Use a token from your inventory
  tokenadmin:
    aliases: [tadmin]
    description: Admin commands for token management
  settokenrecipe:
    aliases: [setrecipe]
    description: Set crafting recipe for a token
  life:
    aliases: [lives]
    description: Manage your lives

permissions:
  token.admin:
    default: op
    description: Admin permission for token commands
  token.use:
    default: true
    description: Permission to use tokens
  token.craft:
    default: true
    description: Permission to craft tokens